<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Contact — TMTL</title>
  <link rel="stylesheet" href="css/styles.css" />
  <meta name="theme-color" content="#000000" />
</head>
<body>
  <header>
    <div class="wrap header-inner">
      <a class="brand" href="index.html">TMTL</a>
      <nav>
        <a href="projects.html">Projects</a>
        <a href="about.html">About</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <h1>Contact</h1>
    <p class="lede">Say hello. We read everything.</p>

    <div class="card" style="max-width:560px;margin-top:16px">
      <form id="contact" action="https://formspree.io/f/xeorropn" method="POST" novalidate>
        <input type="text" name="name" placeholder="Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <textarea name="message" placeholder="Message" required></textarea>

        <input type="hidden" name="_subject" value="TMTL Contact" />
        <input type="text" name="_honeypot" style="display:none" tabindex="-1" autocomplete="off" />

        <button class="btn" type="submit">Send</button>
        <div class="success" id="ok" role="status">Thanks — we got it.</div>
        <div class="error" id="err" role="alert">Hmm, something went wrong. Try again later.</div>
      </form>
    </div>

    <p class="lede" style="margin-top:18px">Prefer email? <a href="mailto:hello@teachmetolive.com">hello@teachmetolive.com</a></p>
  </main>

  <footer class="wrap">
    <small>© <span id="y"></span> Teach Me To Live LLC · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a></small>
  </footer>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
    const form = document.getElementById('contact');
    const ok = document.getElementById('ok');
    const err = document.getElementById('err');
    ok.style.display = err.style.display = 'none';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      ok.style.display = err.style.display = 'none';
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      }).catch(() => null);
      if (res && res.ok) { form.reset(); ok.style.display = 'block'; }
      else { err.style.display = 'block'; }
    });
  </script>
</body>
</html>
